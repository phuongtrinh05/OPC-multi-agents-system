<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPC Database Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid #1e293b;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }

        .header h1 {
            font-size: 18px; font-weight: 700; color: #f1f5f9;
        }

        .header p {
            font-size: 12px; color: #64748b;
        }

        /* Controls */
        .controls {
            padding: 24px 32px;
            display: flex;
            align-items: flex-end;
            gap: 16px;
            flex-wrap: wrap;
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }

        .control-group {
            display: flex; flex-direction: column; gap: 6px;
        }

        .control-group label {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input[type="number"] {
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
            min-width: 220px;
        }

        select:focus, input[type="number"]:focus {
            border-color: #3b82f6;
        }

        input[type="number"] {
            min-width: 100px;
            width: 100px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px; height: 16px;
            accent-color: #3b82f6;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 13px;
            color: #94a3b8;
            cursor: pointer;
            text-transform: none;
            letter-spacing: 0;
        }

        .btn-load {
            padding: 10px 24px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-load:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-load:disabled {
            opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none;
        }

        .btn-load .spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .btn-load.loading .spinner { display: block; }
        .btn-load.loading .btn-text { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Info bar */
        .info-bar {
            padding: 12px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #64748b;
            border-bottom: 1px solid #1e293b;
        }

        .info-bar .badge {
            padding: 4px 10px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            color: #60a5fa;
            font-size: 12px;
        }

        /* Table */
        .table-wrapper {
            padding: 0 32px 32px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 13px;
        }

        thead th {
            position: sticky;
            top: 0;
            background: #1e293b;
            color: #94a3b8;
            font-weight: 600;
            text-align: left;
            padding: 10px 14px;
            border-bottom: 2px solid #334155;
            white-space: nowrap;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        tbody td {
            padding: 10px 14px;
            border-bottom: 1px solid #1e293b;
            white-space: nowrap;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #cbd5e1;
        }

        tbody tr:nth-child(even) {
            background: rgba(30, 41, 59, 0.4);
        }

        /* Empty / Error states */
        .state-message {
            text-align: center;
            padding: 64px 24px;
            color: #475569;
        }

        .state-message .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .state-message h3 {
            font-size: 18px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .state-message p {
            font-size: 14px;
        }

        .error-message {
            margin: 16px 32px;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #f87171;
            font-size: 13px;
        }

        /* Schema toggle */
        .schema-toggle {
            padding: 0 32px;
            margin-top: 16px;
        }

        .schema-btn {
            background: none;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .schema-btn:hover {
            background: #1e293b;
            color: #e2e8f0;
        }

        .schema-panel {
            margin-top: 10px;
            display: none;
        }

        .schema-panel.open { display: block; }

        .schema-panel table {
            max-width: 500px;
        }

        .schema-panel th {
            background: #0f172a;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .controls { padding: 16px; }
            .table-wrapper { padding: 0 16px 16px; }
            .info-bar { padding: 12px 16px; }
            select { min-width: 160px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">🦆</div>
        <div>
            <h1>OPC Database Viewer</h1>
            <p>MotherDuck Data Explorer</p>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <div class="control-group">
            <label>Chọn bảng dữ liệu</label>
            <select id="tableSelect">
                <option value="">-- Đang tải danh sách... --</option>
            </select>
        </div>
        <div class="control-group">
            <label>Số dòng</label>
            <input type="number" id="limitInput" value="100" min="1" max="10000">
        </div>
        <div class="control-group">
            <div class="checkbox-group">
                <input type="checkbox" id="maskToggle" checked>
                <label for="maskToggle">🔒 Mask dữ liệu nhạy cảm</label>
            </div>
        </div>
        <button class="btn-load" id="loadBtn" onclick="loadData()">
            <span class="spinner"></span>
            <span class="btn-text">📥 Load Data</span>
        </button>
    </div>

    <!-- Content -->
    <div id="content">
        <div class="state-message" id="emptyState">
            <div class="icon">📊</div>
            <h3>Chọn một bảng để xem dữ liệu</h3>
            <p>Chọn bảng từ danh sách và nhấn "Load Data"</p>
        </div>
    </div>

    <script>
        const tableSelect = document.getElementById('tableSelect');
        const limitInput = document.getElementById('limitInput');
        const maskToggle = document.getElementById('maskToggle');
        const loadBtn = document.getElementById('loadBtn');
        const content = document.getElementById('content');

        // Load table list on page load
        async function loadTables() {
            tableSelect.innerHTML = '<option value="">⏳ Đang tải...</option>';
            try {
                const res = await fetch('/api/tables?_t=' + Date.now());
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                tableSelect.innerHTML = '<option value="">-- Chọn bảng (' + data.tables.length + ') --</option>';
                data.tables.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    tableSelect.appendChild(opt);
                });
            } catch (err) {
                console.error('loadTables error:', err);
                tableSelect.innerHTML = '<option value="">❌ Lỗi: ' + err.message + '</option>';
                // Show error in content area too
                content.innerHTML = '<div class="error-message">❌ Không tải được danh sách bảng: ' + err.message + '<br><br>Hãy kiểm tra:<br>• Server Flask đang chạy?<br>• Truy cập đúng URL http://127.0.0.1:5000 ?<br><br><button onclick="loadTables()" style="padding:8px 16px;background:#3b82f6;border:none;color:#fff;border-radius:6px;cursor:pointer;font-family:Inter,sans-serif;">🔄 Thử lại</button></div>';
            }
        }

        async function loadData() {
            const table = tableSelect.value;
            if (!table) { alert('Vui lòng chọn một bảng!'); return; }

            const limit = limitInput.value || 100;
            const mask = maskToggle.checked;

            loadBtn.classList.add('loading');
            loadBtn.disabled = true;

            try {
                const res = await fetch(`/api/table/${encodeURIComponent(table)}?limit=${limit}&mask=${mask}`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                renderTable(data);
            } catch (err) {
                content.innerHTML = `<div class="error-message">❌ ${err.message}</div>`;
            }

            loadBtn.classList.remove('loading');
            loadBtn.disabled = false;
        }

        function renderTable(data) {
            let html = '';

            // Info bar
            html += `
                <div class="info-bar">
                    <span>📋 <strong>${data.table_name}</strong> — ${data.total_rows} dòng (giới hạn: ${data.limit})</span>
                    <span class="badge">${data.columns.length} cột</span>
                </div>
            `;

            // Schema toggle
            html += `
                <div class="schema-toggle">
                    <button class="schema-btn" onclick="toggleSchema()">📐 Xem Schema</button>
                    <div class="schema-panel" id="schemaPanel">
                        <table>
                            <thead><tr><th>Cột</th><th>Kiểu dữ liệu</th><th>Nullable</th></tr></thead>
                            <tbody>
                                ${data.schema.map(s => `
                                    <tr>
                                        <td>${esc(s.column)}</td>
                                        <td>${esc(s.type)}</td>
                                        <td>${esc(s.nullable)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            // Data table
            html += '<div class="table-wrapper"><table>';
            html += '<thead><tr>';
            data.columns.forEach(col => {
                html += `<th>${esc(col)}</th>`;
            });
            html += '</tr></thead><tbody>';

            data.rows.forEach(row => {
                html += '<tr>';
                row.forEach(cell => {
                    html += `<td title="${esc(cell)}">${esc(cell)}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table></div>';

            if (data.rows.length === 0) {
                html += `
                    <div class="state-message">
                        <div class="icon">📭</div>
                        <h3>Bảng trống</h3>
                        <p>Bảng "${data.table_name}" không có dữ liệu.</p>
                    </div>
                `;
            }

            content.innerHTML = html;
        }

        function toggleSchema() {
            const panel = document.getElementById('schemaPanel');
            if (panel) panel.classList.toggle('open');
        }

        function esc(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Init
        loadTables();
    </script>
</body>
</html>
